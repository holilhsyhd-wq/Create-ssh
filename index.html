<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARMODS - ELITE HACKER PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #030508;
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.04) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #00ff66;
        }
        .cyber-card {
            background: rgba(3, 7, 18, 0.85);
            border: 1px solid rgba(0, 255, 102, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.1);
        }
        .btn-protocol { transition: all 0.3s ease; border: 1px solid rgba(0, 255, 102, 0.2); }
        .btn-protocol.active {
            background: #00ff66; color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.6);
            border-color: #00ff66;
        }
        .whatsapp-float {
            background: #25D366; color: #fff;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.5);
            font-family: sans-serif;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999; background-size: 100% 3px, 6px 100%; pointer-events: none;
        }
        .profile-ring {
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4), inset 0 0 15px rgba(0, 255, 102, 0.4);
        }
        input { font-family: 'Share Tech Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030508; }
        ::-webkit-scrollbar-thumb { background: #00ff66; }
    </style>
</head>
<body class="min-h-screen pb-24 selection:bg-emerald-500 selection:text-black">
    <div class="scanlines"></div>

    <div class="max-w-4xl mx-auto px-4 pt-10 space-y-6 relative z-10">
        
        <!-- HEADER DENGAN GAMBAR KUNCI ABSOLUT -->
        <div class="flex flex-col items-center text-center space-y-3 border-b border-emerald-500/30 pb-6 mb-8 relative">
            <div class="absolute top-0 right-0 px-2 py-1 bg-emerald-500 text-black text-[10px] font-bold animate-pulse">VERCEL SECURE PROXY</div>
            
            <!-- Foto Profil Bulat (Fix Ukuran Permanen 80x80) -->
            <div class="profile-ring animate-pulse mt-2" style="width: 80px; height: 80px; min-width: 80px; min-height: 80px; border-radius: 50%; padding: 2px; background: linear-gradient(to top right, #10b981, #06b6d4); margin: 0 auto; display: block;">
                <img src="https://cdn.yupra.my.id/yp/0zhfv6ka.jpg" alt="Profile" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid #030508; display: block;">
            </div>
            
            <!-- Kata-kata Motivasi -->
            <div class="mt-2 mb-1 px-5 py-1.5 bg-emerald-950/40 border border-emerald-500/30 rounded-full inline-block">
                <p class="text-[11px] md:text-xs font-bold tracking-widest text-emerald-300 m-0">"Jadilah Baik"</p>
            </div>

            <!-- Judul -->
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-emerald-400 mt-1" style="text-shadow: 0 0 10px rgba(0,255,102,0.5);">
                BARMODS_X_TUNNEL://
            </h1>
            <p class="text-xs md:text-sm text-emerald-600">CloudFront Ultimate Edition Auto-Generator</p>
        </div>

        <!-- MAIN FORM GENERATOR -->
        <div class="cyber-card p-6 md:p-8 relative">
            <div class="absolute -top-3 left-4 px-2 bg-[#030508] text-sm text-emerald-400">[ INJECTION_ENGINE ]</div>
            
            <!-- PROTOCOL SELECTOR -->
            <div class="grid grid-cols-3 gap-3 mb-6 mt-2">
                <button onclick="setProtocol('ssh')" id="btn-ssh" class="btn-protocol active py-3 text-sm flex flex-col items-center gap-1 text-emerald-500 hover:bg-emerald-500/10">
                    <i class="fa-solid fa-shield-halved text-lg"></i> SSH
                </button>
                <button onclick="setProtocol('vmess')" id="btn-vmess" class="btn-protocol py-3 text-sm flex flex-col items-center gap-1 text-emerald-500 hover:bg-emerald-500/10">
                    <i class="fa-solid fa-cube text-lg"></i> VMESS
                </button>
                <button onclick="setProtocol('vless')" id="btn-vless" class="btn-protocol py-3 text-sm flex flex-col items-center gap-1 text-emerald-500 hover:bg-emerald-500/10">
                    <i class="fa-solid fa-bolt text-lg"></i> VLESS
                </button>
            </div>

            <!-- INPUT FIELDS -->
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-emerald-600 mb-1">TARGET_USERNAME</label>
                    <input type="text" id="inpUser" placeholder="root_user" class="w-full bg-black border border-emerald-500/30 px-4 py-3 text-sm focus:outline-none focus:border-emerald-400 text-emerald-400 placeholder:text-emerald-900">
                </div>
                
                <div id="passGroup">
                    <label class="block text-xs font-bold text-emerald-600 mb-1">ACCESS_PASSWORD</label>
                    <input type="text" id="inpPass" placeholder="p4ssw0rd" class="w-full bg-black border border-emerald-500/30 px-4 py-3 text-sm focus:outline-none focus:border-emerald-400 text-emerald-400 placeholder:text-emerald-900">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-emerald-600 mb-1">LIMIT_KUOTA (GB)</label>
                        <input type="number" id="inpQuota" placeholder="ex: 50" value="50" class="w-full bg-black border border-emerald-500/30 px-4 py-3 text-sm focus:outline-none focus:border-emerald-400 text-emerald-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-emerald-600 mb-1">EXPIRED_DAYS</label>
                        <input type="number" id="inpDays" value="30" class="w-full bg-black border border-emerald-500/30 px-4 py-3 text-sm focus:outline-none focus:border-emerald-400 text-emerald-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-red-500 mb-1">IP_LIMIT (LOCKED)</label>
                        <input type="number" value="2" disabled class="w-full bg-red-950/20 border border-red-500/30 text-red-500 px-4 py-3 text-sm cursor-not-allowed opacity-80 text-center">
                    </div>
                </div>

                <button onclick="generateAccount()" class="w-full mt-6 bg-emerald-500/10 hover:bg-emerald-500 text-emerald-400 hover:text-black font-bold text-sm py-4 border border-emerald-500 transition-all flex justify-center items-center gap-2">
                    <i class="fa-solid fa-terminal animate-pulse"></i> EXECUTE EXPLOIT
                </button>
            </div>
        </div>

        <!-- OUTPUT RESULT -->
        <div id="resultBox" class="hidden cyber-card p-6 md:p-8 relative mt-6">
            <div class="absolute -top-3 left-4 px-2 bg-[#030508] text-sm text-emerald-400">[ SYS_OUTPUT_LOG.TXT ]</div>
            <div class="flex justify-end mb-2 mt-2">
                <button onclick="copyText()" class="text-xs bg-emerald-500 text-black px-4 py-1.5 font-bold hover:bg-emerald-400 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-paste"></i> COPY CONFIG DATA
                </button>
            </div>
            <textarea id="outputArea" readonly rows="16" class="w-full bg-black border border-emerald-500/20 p-4 text-xs text-emerald-400 focus:outline-none block resize-none leading-relaxed"></textarea>
        </div>

    </div>

    <!-- WHATSAPP DEV FLOATING BUTTON -->
    <a href="https://wa.me/6283877842721" target="_blank" class="fixed bottom-6 right-6 whatsapp-float px-5 py-3 rounded-full flex items-center gap-3 hover:scale-105 transition-transform z-50">
        <i class="fa-brands fa-whatsapp text-3xl"></i>
        <div class="hidden md:block pr-2">
            <p class="text-[10px] font-bold uppercase tracking-wider opacity-80 leading-none mb-1">Hubungi Dev</p>
            <p class="text-sm font-bold leading-none">Barmods X</p>
        </div>
    </a>

    <script>
        let currentProtocol = 'ssh';

        function setProtocol(proto) {
            currentProtocol = proto;
            document.querySelectorAll('.btn-protocol').forEach(el => {
                el.classList.remove('active', 'text-black', 'bg-emerald-500');
                el.classList.add('text-emerald-500', 'hover:bg-emerald-500/10');
            });
            const activeBtn = document.getElementById('btn-' + proto);
            activeBtn.classList.add('active', 'text-black');
            activeBtn.classList.remove('text-emerald-500', 'hover:bg-emerald-500/10');
            
            document.getElementById('passGroup').style.display = (proto === 'ssh') ? 'block' : 'none';
        }

        async function generateAccount() {
            const user = document.getElementById('inpUser').value;
            const pass = document.getElementById('inpPass').value;
            const quota = document.getElementById('inpQuota').value;
            const days = document.getElementById('inpDays').value;

            if(!user) return Swal.fire({ icon: 'error', title: 'ACCESS DENIED', text: 'Username wajib diisi!', background: '#030508', color: '#00ff66' });
            if(currentProtocol === 'ssh' && !pass) return Swal.fire({ icon: 'error', title: 'ACCESS DENIED', text: 'Password wajib diisi!', background: '#030508', color: '#00ff66' });

            Swal.fire({ title: 'INJECTING PAYLOAD...', background: '#030508', color: '#00ff66', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                // Tembak ke API Vercel lokal (Serverless)
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ protocol: currentProtocol, username: user, password: pass, expired_days: days, quota: quota, ip_limit: 2 })
                });

                const json = await res.json();
                Swal.close();

                if(res.ok && json.status === 'success') {
                    document.getElementById('resultBox').classList.remove('hidden');
                    document.getElementById('outputArea').value = json.data.config_text;
                    document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
                    Swal.fire({ icon: 'success', title: 'EXPLOIT SUCCESS', text: 'Akun telah tergenerate di sistem.', background: '#030508', color: '#00ff66', confirmButtonColor: '#00ff66' });
                } else {
                    Swal.fire({ icon: 'error', title: 'EXPLOIT FAILED', text: json.message || 'Error pada core system.', background: '#030508', color: '#00ff66' });
                }
            } catch (err) {
                Swal.close();
                Swal.fire({ icon: 'error', title: 'CONNECTION LOST', text: 'Gagal terhubung ke Vercel Node.', background: '#030508', color: '#00ff66' });
            }
        }

        function copyText() {
            const copyText = document.getElementById("outputArea");
            copyText.select();
            document.execCommand("copy");
            Swal.fire({ icon: 'success', title: 'DATA COPIED', text: 'Konfigurasi tersalin ke clipboard.', background: '#030508', color: '#00ff66', timer: 1500, showConfirmButton: false });
        }
    </script>
</body>
  </html>
